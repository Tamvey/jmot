# config/tracker_config.yaml
tracker:
  det_thresh: 0.2
  max_age: 30
  max_obs: 35
  min_hits: 3
  iou_threshold: 0.3

  min_conf: 0.1
  delta_t: 3
  inertia: 0.2
  Q_xy_scaling: 0.01
  Q_s_scaling: 0.0001

detector:
  engine_path: "/home/matvey/models/yolo11s_5cls.engine"
  use_sahi: true
  sahi:
    patch_width: 640
    patch_height: 640
    overlap_ratio: 0.2
    conf_threshold: 0.2